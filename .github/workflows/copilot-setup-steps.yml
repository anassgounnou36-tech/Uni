name: Copilot Setup Steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Install system packages for fork tests
        run: sudo apt-get update && sudo apt-get install -y ca-certificates curl jq

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Verify toolchain
        run: |
          node --version
          pnpm --version
          forge --version
