name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Foundry tests
        working-directory: contracts/executor
        run: forge test

      - name: Arbitrum fork smoke test
        working-directory: contracts/executor
        env:
          ARB1_RPC_URL: https://arb1-sequencer.arbitrum.io/rpc
        run: forge test --match-test testArbitrumAddressesHaveBytecode

      - name: Build
        run: pnpm build
